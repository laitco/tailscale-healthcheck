name: Publish dev/beta image (dev)

on:
  workflow_run:
    workflows: ["Validate PR&Commits"]
    types: [completed]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish_dev:
    name: Build and push dev/beta image
    # Run only when Validate PR&Commits succeeded on the dev branch
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the exact commit that Validate PR&Commits validated
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :dev and :beta
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            laitco/tailscale-healthcheck:dev
            laitco/tailscale-healthcheck:beta
            ghcr.io/${{ github.repository }}:dev
            ghcr.io/${{ github.repository }}:beta
